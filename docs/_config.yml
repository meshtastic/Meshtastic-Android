# Callouts (just-the-docs v0.11+)
callouts:
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow

exclude:
  - Gemfile
  - Gemfile.lock
  - assets/screenshots/.gitkeep
  - README.md
  - "*.sh"

