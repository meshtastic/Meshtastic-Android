title: Meshtastic Android
description: "User and developer documentation for the Meshtastic Android, Desktop, and iOS applications."
baseurl: ""
url: ""

# just-the-docs theme
# Local builds use `gem "just-the-docs"` from Gemfile.
# GitHub Pages uses remote_theme for hosted builds.
theme: just-the-docs
remote_theme: just-the-docs/just-the-docs@v0.11.0

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-redirect-from

# Navigation
nav_enabled: true
search_enabled: true
search_tokenizer_separator: /[\s\-/]+/

# Heading anchors (clickable § links)
heading_anchors: true

# Color scheme — loads _sass/color_schemes/meshtastic.scss
color_scheme: meshtastic

# Default front-matter for pages in subdirectories
defaults:
  - scope:
      path: "user"
    values:
      parent: User Guide
      layout: default
  - scope:
      path: "developer"
    values:
      parent: Developer Guide
      layout: default
  # Locale-translated pages are excluded from main nav but still rendered.
  # They use a dedicated locale layout with a back-link to the English version.
  - scope:
      path: "es"
    values:
      layout: locale_page
      locale: es
      nav_exclude: true
  - scope:
      path: "fr"
    values:
      layout: locale_page
      locale: fr
      nav_exclude: true
  - scope:
      path: "de"
    values:
      layout: locale_page
      locale: de
      nav_exclude: true
  - scope:
      path: "pt"
    values:
      layout: locale_page
      locale: pt
      nav_exclude: true
  - scope:
      path: "it"
    values:
      layout: locale_page
      locale: it
      nav_exclude: true
  - scope:
      path: "ja"
    values:
      layout: locale_page
      locale: ja
      nav_exclude: true
  - scope:
      path: "ko"
    values:
      layout: locale_page
      locale: ko
      nav_exclude: true
  - scope:
      path: "zh"
    values:
      layout: locale_page
      locale: zh
      nav_exclude: true
  - scope:
      path: "ru"
    values:
      layout: locale_page
      locale: ru
      nav_exclude: true
  - scope:
      path: "tr"
    values:
      layout: locale_page
      locale: tr
      nav_exclude: true
  - scope:
      path: "ar"
    values:
      layout: locale_page
      locale: ar
      nav_exclude: true

# Callouts (just-the-docs v0.11+)
callouts:
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow

exclude:
  - Gemfile
  - Gemfile.lock
  - assets/screenshots/.gitkeep
  - "*.sh"

