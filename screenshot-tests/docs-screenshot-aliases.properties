# Screenshot alias mapping: semantic_name=CST_reference_filename
# Used by copyDocsScreenshots to rename CST-generated screenshots to the
# human-readable names referenced in docs/user/**/*.md and docs/developer/**/*.md.
# Only aliased screenshots are copied into docs/assets/screenshots/ (the tracked
# set shared by the Jekyll site and the in-app docs bundle).
#
# Format: docs_name=cst_reference_filename (both without directory prefix)
# Lines starting with # are comments. Blank lines are ignored.

