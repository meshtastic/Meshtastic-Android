# .github/release.yml - GitHub Release Notes Configuration
#
# Labels here must match actual repo labels. Run `gh label list` to verify.
# Auto-labeler: .github/workflows/pull-request-target.yml
# AI classifier: .github/workflows/models_pr_triage.yml

changelog:
  exclude:
    labels:
      - dependencies
      - automation
      - release
      - repo
      - skip-changelog
      - chore
      - ci
      - build
      - testing
      - refactor
      - documentation
      - l10n
    authors:
      - renovate[bot]
      - dependabot[bot]
      - github-actions[bot]

  categories:
    - title: 🏗️ Features
      labels:
        - enhancement
    - title: 🖥️ Desktop
      labels:
        - desktop
    - title: 🛠️ Fixes
      labels:
        - bug
        - bugfix
    - title: 📝 Other Changes
      labels:
        - '*'
