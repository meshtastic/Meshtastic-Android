name: Sync Android Docs to meshtastic.org

on:
  push:
    branches: [main]
    paths:
      - 'docs/user/**'
      - 'docs/developer/**'
      - 'docs/index.md'
      - 'docs/assets/screenshots/**'
      - 'scripts/sync-android-docs.js'
      - '.github/workflows/sync-android-docs.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout Meshtastic-Android
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout meshtastic/meshtastic
        uses: actions/checkout@v4
        with:
          repository: meshtastic/meshtastic
          path: meshtastic-site
          token: ${{ secrets.DOCS_SYNC_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install cwebp
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Run sync script
        working-directory: meshtastic-site
        run: node "${{ github.workspace }}/scripts/sync-android-docs.js" --convert-webp

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          path: meshtastic-site
          token: ${{ secrets.DOCS_SYNC_TOKEN }}
          commit-message: "docs: sync latest Android app documentation"
          branch: sync/android-docs
          delete-branch: true
          title: "docs: sync latest Android app documentation"
          body: |
            This PR was automatically created by the [sync-android-docs](https://github.com/meshtastic/Meshtastic-Android/blob/main/.github/workflows/sync-android-docs.yml) workflow.

            It synchronizes Markdown documentation and images from [meshtastic/Meshtastic-Android](https://github.com/meshtastic/Meshtastic-Android) into this repository:

            - Markdown files → `docs/software/android/`
            - Image files → `static/img/android/`

            Image paths in Markdown are rewritten to use the Docusaurus `/img/android/` static path.
            Screenshots are converted to WebP for optimal site performance.
