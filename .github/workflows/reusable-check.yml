name: Reusable Android Check

on:
  workflow_call:
    inputs:
      run_lint:
        type: boolean
        default: true
      run_unit_tests:
        type: boolean
        default: true
      run_coverage:
        type: boolean
        default: true
      run_desktop_builds:
        type: boolean
        default: true
      upload_artifacts:
        type: boolean
        default: true
    secrets:
      GRADLE_ENCRYPTION_KEY:
        required: false
      CODECOV_TOKEN:
        required: false
      DATADOG_APPLICATION_ID:
        required: false
      DATADOG_CLIENT_TOKEN:
        required: false
      GOOGLE_MAPS_API_KEY:
        required: false
      GRADLE_CACHE_URL:
        required: false
      GRADLE_CACHE_USERNAME:
        required: false
      GRADLE_CACHE_PASSWORD:
        required: false

env:
  DATADOG_APPLICATION_ID: ${{ secrets.DATADOG_APPLICATION_ID }}
  DATADOG_CLIENT_TOKEN: ${{ secrets.DATADOG_CLIENT_TOKEN }}
  MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
  GITHUB_TOKEN: ${{ github.token }}
  GRADLE_CACHE_URL: ${{ secrets.GRADLE_CACHE_URL }}
  GRADLE_CACHE_USERNAME: ${{ secrets.GRADLE_CACHE_USERNAME }}
  GRADLE_CACHE_PASSWORD: ${{ secrets.GRADLE_CACHE_PASSWORD }}
  # Fallback VERSION_CODE for the lint-check job itself (which computes the real
  # value from git). Downstream jobs override this with the git-derived value.
  VERSION_CODE: ${{ github.run_number }}

jobs:
  # ── Lint & Static Analysis ──────────────────────────────────────────
  lint-check:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 30
    outputs:
      cache_read_only: ${{ steps.cache_config.outputs.cache_read_only }}
      version_code: ${{ steps.version_code.outputs.version_code }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: 'blob:none'
          submodules: true

      - name: Determine cache read-only setting
        id: cache_config
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.event_name }}" == "merge_group" ]] || [[ "${{ github.ref }}" == gh-readonly-queue/* ]]; then
            echo "cache_read_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "cache_read_only=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate version code from git commit count
        id: version_code
        shell: bash
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          OFFSET=$(grep '^VERSION_CODE_OFFSET=' config.properties | cut -d'=' -f2 || echo 0)
          VERSION_CODE=$((COMMIT_COUNT + OFFSET))
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Gradle Setup
        uses: ./.github/actions/gradle-setup
        with:
          gradle_encryption_key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache_read_only: ${{ steps.cache_config.outputs.cache_read_only }}

      - name: Lint, Analysis & KMP Smoke Compile
        if: inputs.run_lint == true
        run: ./gradlew spotlessCheck detekt app:lintFdroidDebug app:lintGoogleDebug core:barcode:lintFdroidDebug core:barcode:lintGoogleDebug core:api:lintDebug kmpSmokeCompile -Pci=true --continue --scan

      - name: KMP Smoke Compile (lint skipped)
        if: inputs.run_lint == false
        run: ./gradlew kmpSmokeCompile -Pci=true --continue --scan

  # ── Sharded Unit Tests ──────────────────────────────────────────────
  # Tests are split into 4 shards that run in parallel:
  #   shard-core:       core:* KMP module tests (allTests)
  #   shard-feature:    feature:* KMP module tests (allTests)
  #   shard-app:        Pure-Android/JVM tests (app, desktop, core:barcode, etc.)
  #   shard-screenshot: Compose Preview Screenshot visual regression tests
  test-shards:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 45
    needs: lint-check
    if: inputs.run_unit_tests == true
    env:
      VERSION_CODE: ${{ needs.lint-check.outputs.version_code }}
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: shard-core
            tasks: >-
              :core:ble:allTests
              :core:common:allTests
              :core:data:allTests
              :core:database:allTests
              :core:domain:allTests
              :core:model:allTests
              :core:navigation:allTests
              :core:network:allTests
              :core:prefs:allTests
              :core:repository:allTests
              :core:service:allTests
              :core:takserver:allTests
              :core:testing:allTests
              :core:ui:allTests
            kover: >-
              :core:ble:koverXmlReport
              :core:common:koverXmlReport
              :core:data:koverXmlReport
              :core:database:koverXmlReport
              :core:domain:koverXmlReport
              :core:model:koverXmlReport
              :core:navigation:koverXmlReport
              :core:network:koverXmlReport
              :core:prefs:koverXmlReport
              :core:repository:koverXmlReport
              :core:service:koverXmlReport
              :core:takserver:koverXmlReport
              :core:testing:koverXmlReport
              :core:ui:koverXmlReport
          - name: shard-feature
            tasks: >-
              :feature:connections:allTests
              :feature:firmware:allTests
              :feature:intro:allTests
              :feature:map:allTests
              :feature:messaging:allTests
              :feature:node:allTests
              :feature:settings:allTests
            kover: >-
              :feature:connections:koverXmlReport
              :feature:firmware:koverXmlReport
              :feature:intro:koverXmlReport
              :feature:map:koverXmlReport
              :feature:messaging:koverXmlReport
              :feature:node:koverXmlReport
              :feature:settings:koverXmlReport
          - name: shard-app
            tasks: >-
              :app:testFdroidDebugUnitTest
              :app:testGoogleDebugUnitTest
              :desktop:test
              :core:barcode:testFdroidDebugUnitTest
              :core:barcode:testGoogleDebugUnitTest
            kover: >-
              :app:koverXmlReportFdroidDebug
              :app:koverXmlReportGoogleDebug
              :core:barcode:koverXmlReportFdroidDebug
              :core:barcode:koverXmlReportGoogleDebug
              :desktop:koverXmlReport
          - name: shard-screenshot
            tasks: >-
              :app:validateGoogleDebugScreenshotTest
            kover: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true
          # For screenshot auto-commit, use the PR head ref so we can push back
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ github.token }}

      - name: Gradle Setup
        uses: ./.github/actions/gradle-setup
        with:
          gradle_encryption_key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache_read_only: ${{ needs.lint-check.outputs.cache_read_only }}

      # ── Non-screenshot shards: run tests normally ──
      - name: Run Tests & Coverage (${{ matrix.shard.name }})
        if: matrix.shard.name != 'shard-screenshot'
        run: |
          kover_tasks=""
          if [[ "${{ inputs.run_coverage }}" == "true" ]]; then
            kover_tasks="${{ matrix.shard.kover }}"
          fi
          ./gradlew ${{ matrix.shard.tasks }} $kover_tasks -Pci=true --continue --scan

      # ── Screenshot shard: validate → fork-check → auto-record → auto-commit ──
      - name: Validate screenshot tests
        id: screenshotsverify
        if: matrix.shard.name == 'shard-screenshot'
        continue-on-error: true
        run: ./gradlew :app:validateGoogleDebugScreenshotTest -Pci=true --scan

      - name: Prevent auto-update on fork PRs
        if: >-
          matrix.shard.name == 'shard-screenshot'
          && steps.screenshotsverify.outcome == 'failure'
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::Screenshot tests failed. Fork PRs cannot auto-update references."
          echo "::error::Please run './gradlew updateGoogleDebugScreenshotTest' locally and push the updated images."
          exit 1

      - name: Auto-record updated screenshots
        id: screenshotsrecord
        if: >-
          matrix.shard.name == 'shard-screenshot'
          && steps.screenshotsverify.outcome == 'failure'
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name == github.repository
        run: ./gradlew :app:updateGoogleDebugScreenshotTest -Pci=true --scan

      - name: Push updated screenshot references
        # NOTE: Requires the calling workflow to grant `contents: write` permission.
        # Fork PRs always get read-only tokens regardless.
        if: steps.screenshotsrecord.outcome == 'success'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'app/src/screenshotTestGoogleDebug/reference/**/*.png'
          disable_globbing: true
          commit_message: "chore(test): auto-update screenshot references"

      - name: Fail if screenshots failed on merge queue or main
        if: >-
          matrix.shard.name == 'shard-screenshot'
          && steps.screenshotsverify.outcome == 'failure'
          && github.event_name != 'pull_request'
        run: |
          echo "::error::Screenshot tests failed on merge queue / main. References must be updated in the PR."
          exit 1

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.shard.name != 'shard-screenshot' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: meshtastic/Meshtastic-Android
          flags: ${{ matrix.shard.name }}
          fail_ci_if_error: false
          report_type: test_results
          files: "**/build/test-results/**/*.xml"

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && matrix.shard.name != 'shard-screenshot' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: meshtastic/Meshtastic-Android
          flags: ${{ matrix.shard.name }}
          fail_ci_if_error: false
          files: "**/build/reports/kover/report*.xml"

      - name: Upload shard reports
        if: ${{ always() && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: reports-${{ matrix.shard.name }}
          path: |
            **/build/reports
            **/build/test-results
          retention-days: 7

      - name: Upload screenshot diff images
        if: >-
          always()
          && matrix.shard.name == 'shard-screenshot'
          && steps.screenshotsverify.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-diffs
          path: app/build/reports/screenshotTest/preview/debug/google/
          retention-days: 7

      - name: Screenshot test failure summary
        if: >-
          matrix.shard.name == 'shard-screenshot'
          && steps.screenshotsverify.outcome == 'failure'
        shell: bash
        run: |
          DIFF_DIR="app/build/reports/screenshotTest/preview/debug/google"
          {
            echo "### Screenshot Test Failures"
            echo ""
            if [[ "${{ steps.screenshotsrecord.outcome }}" == "success" ]]; then
              echo "References were **auto-updated** and pushed to this branch."
              echo "Pull the latest changes to get the new reference images."
            else
              echo "One or more screenshot tests failed visual comparison."
              echo "Download the \`screenshot-diffs\` artifact to inspect diff images."
            fi
            echo ""
            if [ -d "$DIFF_DIR" ]; then
              FAILURES=$(find "$DIFF_DIR" -name "*_diff.png" 2>/dev/null | wc -l | tr -d ' ')
              echo "**${FAILURES} diff image(s) generated.**"
              echo ""
              echo "<details>"
              echo "<summary>Failed screenshot tests</summary>"
              echo ""
              find "$DIFF_DIR" -name "*_diff.png" -exec basename {} _diff.png \; | sort | while read -r name; do
                echo "- \`${name}\`"
              done
              echo ""
              echo "</details>"
            else
              echo "_No diff directory found at \`${DIFF_DIR}\`. Check the build logs for details._"
            fi
            echo ""
            echo "#### How to update reference images locally"
            echo "\`\`\`bash"
            echo "./gradlew updateGoogleDebugScreenshotTest"
            echo "\`\`\`"
            echo "Commit the updated \`.png\` files under \`app/src/screenshotTestGoogleDebug/reference/\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Android Build ────────────────────────────────────────────────────
  android-check:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 60
    needs: lint-check
    env:
      VERSION_CODE: ${{ needs.lint-check.outputs.version_code }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true

      - name: Gradle Setup
        uses: ./.github/actions/gradle-setup
        with:
          gradle_encryption_key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache_read_only: ${{ needs.lint-check.outputs.cache_read_only }}

      - name: Build Android APKs
        run: ./gradlew app:assembleFdroidDebug app:assembleGoogleDebug -Pci=true --parallel --configuration-cache --continue --scan

      - name: Upload debug artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apks
          path: app/build/outputs/apk/*/debug/*.apk
          retention-days: 7

      - name: Report App Size
        if: always()
        run: |
          echo "### App Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          find app/build/outputs/apk -name "*.apk" -exec du -h {} + | awk '{print "| " $2 " | " $1 " |"}' >> $GITHUB_STEP_SUMMARY

  # ── Desktop Build ───────────────────────────────────────────────────
  build-desktop:
    name: Build Desktop Debug (${{ matrix.os }})
    if: inputs.run_desktop_builds == true
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 60
    needs: lint-check
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-24.04, ubuntu-24.04-arm]
    env:
      VERSION_CODE: ${{ needs.lint-check.outputs.version_code }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true

      - name: Gradle Setup
        uses: ./.github/actions/gradle-setup
        with:
          gradle_encryption_key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache_read_only: ${{ needs.lint-check.outputs.cache_read_only }}

      - name: Build Desktop
        run: ./gradlew :desktop:createDistributable -Pci=true --scan

      - name: Upload Desktop artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: desktop-app-${{ runner.os }}-${{ runner.arch }}
          path: desktop/build/compose/binaries/main/app/
          retention-days: 7
